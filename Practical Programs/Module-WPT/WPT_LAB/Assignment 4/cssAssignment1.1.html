<!DOCTYPE html>
<html>
<head>
    <title>Internal CSS Example</title>
    <style>
        .input-fields {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .input-fields input {
            margin: 0 10px;
            border: 3px solid rgba(2, 63, 89, 0.774);
            padding: 5px;
        }
        .styled-image {
            margin-top: 30px;
            border: 5px solid rgb(228, 51, 134);
            border-radius: 50%;
            width: 200px;
            height: 200px;
            display: block;
            margin-left: auto;
            margin-right: auto; 
        }
    </style>
</head>

<body>
    <div class="input-fields">
        <input type="text" placeholder="First Name">
        <input type="text" placeholder="Middle Name">
        <input type="text" placeholder="Last Name">
    </div>
    <img src="https://picsum.photos/200" alt="Sample Image" class="styled-image">
</body>
</html>
